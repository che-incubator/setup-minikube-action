# Check the given PR

name: check-pr

# Trigger the workflow on push or pull request
on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: build
        run: |
          yarn
